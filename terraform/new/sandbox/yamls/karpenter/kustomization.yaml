apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../../k8s/production/karpenter/provisioners/runners/testing/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/graviton/2/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/graviton/3/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/x86_64/v2/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/x86_64/v3/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/x86_64/v4/provisioners.yaml
- ../../../../../k8s/production/karpenter/provisioners/runners/windows/x86_64/v2/provisioner.yaml
- ../../../../../k8s/production/karpenter/provisioners/gitlab/provisioner.yaml
- ../../../../../k8s/production/karpenter/provisioners/beefy/provisioner.yaml
- ../../../../../k8s/production/karpenter/provisioners/base/provisioner.yaml
patches:
  - target:
      kind: NodePool
      name: glr-x86-64-v2
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/2/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]

  - target:
      kind: NodePool
      name: glr-x86-64-v3
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/3/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]

  - target:
      kind: NodePool
      name: glr-x86-64-v4
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/3/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]

  - target:
      kind: NodePool
      name: glr-graviton2
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/2/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]

  - target:
      kind: NodePool
      name: glr-graviton3
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/3/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]

  - target:
      kind: NodePool
      name: x86-64-v2-win
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/5/values
        value: ["us-east-2a", "us-east-2b", "us-east-2c"]
